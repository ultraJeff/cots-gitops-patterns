# Bind the custom SCC to the COTS app's service accounts
# This grants the SCC permissions without modifying the Deployments themselves

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cots-app-scc-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:cots-app-scc
subjects:
  # Add each service account that needs elevated permissions
  - kind: ServiceAccount
    name: cots-app
    namespace: cots-app
  - kind: ServiceAccount
    name: cots-app-api
    namespace: cots-app
  - kind: ServiceAccount
    name: cots-app-worker
    namespace: cots-app
