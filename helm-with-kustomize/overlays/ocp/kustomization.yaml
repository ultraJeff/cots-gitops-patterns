apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No resources listed here — ArgoCD feeds the Helm-rendered
# manifests into Kustomize automatically via multi-source

patches:
  # Strategic merge patch: fix securityContext on specific deployments
  - path: patches/fix-scc.yaml

  # JSON patch: remove privileged flag from a specific container
  - target:
      kind: Deployment
      name: cots-app-worker
    patch: |
      - op: remove
        path: /spec/template/spec/containers/0/securityContext/privileged

  # JSON patch: set runAsNonRoot on all Deployments
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/securityContext/runAsNonRoot
        value: true

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: cots-app
